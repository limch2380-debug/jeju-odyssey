<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>제주 오디세이 | 통합 관리 센터 (GOD_MODE)</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body { background: #050608; overflow-y: auto; display: block; height: auto; padding-bottom: 50px;}
        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
        .admin-section { 
            background: var(--glass-bg); 
            border: 1px solid var(--glass-border); 
            border-radius: 20px; 
            padding: 30px; 
            margin-bottom: 30px;
            backdrop-filter: blur(20px);
        }
        h2 { font-family: 'Space Grotesk'; color: var(--primary-gold); margin-bottom: 25px; letter-spacing: 2px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px; }
        .input-group { margin-bottom: 20px; }
        label { display: block; font-size: 0.75rem; color: var(--text-dim); margin-bottom: 8px; letter-spacing: 1px; }
        input, select { 
            width: 100%; 
            background: rgba(255,255,255,0.05); 
            border: 1px solid var(--glass-border); 
            color: #fff; 
            padding: 12px 15px; 
            border-radius: 8px; 
            font-family: 'Space Grotesk'; 
        }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .monster-card { 
            background: rgba(255,255,255,0.03); 
            border: 1px solid var(--glass-border); 
            padding: 20px; 
            border-radius: 12px; 
            margin-bottom: 15px;
        }
        .save-btn { 
            background: linear-gradient(135deg, var(--primary-gold) 0%, #b89a00 100%); 
            color: #000; 
            border: none; 
            padding: 15px 30px; 
            cursor: pointer; 
            border-radius: 10px; 
            font-weight: bold; 
            width: 100%; 
            font-family: 'Space Grotesk';
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="container">
        <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px;">
            <h1 style="font-family: 'Space Grotesk'; color: var(--primary-gold); font-size: 1.5rem;">AUTHORITY_CENTER // GOD_MODE</h1>
            <a href="index.html" class="btn-nav">메인 화면으로</a>
        </header>

        <!-- Player Settings -->
        <div class="admin-section">
            <h2>COMMANDER_CORE_STATS</h2>
            <div class="grid-2">
                <div class="input-group">
                    <label>PLAYER_MAX_HP</label>
                    <input type="number" id="player-hp" value="100">
                </div>
                <div class="input-group">
                    <label>PLAYER_ATTACK_POWER (BASE)</label>
                    <input type="number" id="player-atk" value="20">
                </div>
                <div class="input-group">
                    <label>PLAYER_DEFENSE (REDUCE %)</label>
                    <input type="number" id="player-def" value="10">
                </div>
                <div class="input-group">
                    <label>INITIAL_POTIONS</label>
                    <input type="number" id="player-potions" value="1">
                </div>
            </div>
            <button class="save-btn" onclick="savePlayerSettings()">SAVE_PLAYER_STATS</button>
        </div>

        <!-- Monster Settings -->
        <div class="admin-section">
            <h2>BIOLOGICAL_THREAT_DATABASE</h2>
            <div id="monster-list">
                <!-- Monsters will be listed here -->
            </div>
            <button class="btn-nav" style="width: 100%; text-align: center; margin-top: 10px;" onclick="saveMonsterPool()">SAVE_MONSTER_DATABASE</button>
        </div>

        <!-- Loot Settings -->
        <div class="admin-section">
            <h2>LOOT_DROP_PROTOCOL</h2>
            <div class="grid-2">
                <div class="input-group">
                    <label>POTION_DROP_CHANCE (0.0 - 1.0)</label>
                    <input type="number" step="0.1" id="drop-chance" value="0.3">
                </div>
                <div class="input-group" style="display: flex; align-items: center; gap: 10px; margin-top: 25px;">
                    <input type="checkbox" id="fixed-drop" style="width: 20px; height: 20px;">
                    <label style="margin-bottom: 0;">GUARANTEED_DROP (100%)</label>
                </div>
            </div>
            <button class="save-btn" style="background: linear-gradient(135deg, var(--secondary-cyan) 0%, #00a89d 100%);" onclick="saveLootSettings()">SAVE_LOOT_PROTOCOL</button>
        </div>
    </div>

    <script>
        // Load Initial State
        const DEFAULT_MONSTERS = [
            { name: "고블린 병사 (SOLDIER)", hp: 100, dmg: 8, img: "goblin_soldier_tactical.png" },
            { name: "고블린 궁수 (ARCHER)", hp: 70, dmg: 12, img: "goblin_archer_cloak.png" },
            { name: "대왕 고블린 (BOSS)", hp: 250, dmg: 18, img: "great_goblin_boss.png" }
        ];

        function initAdmin() {
            // Player
            const pStats = JSON.parse(localStorage.getItem('playerSettings') || '{"hp": 100, "atk": 20, "def": 10, "potions": 1}');
            document.getElementById('player-hp').value = pStats.hp;
            document.getElementById('player-atk').value = pStats.atk;
            document.getElementById('player-def').value = pStats.def;
            document.getElementById('player-potions').value = pStats.potions;

            // Loot
            const lStats = JSON.parse(localStorage.getItem('lootSettings') || '{"chance": 0.3, "fixed": false}');
            document.getElementById('drop-chance').value = lStats.chance;
            document.getElementById('fixed-drop').checked = lStats.fixed;

            // Monsters
            renderMonsters();
        }

        function renderMonsters() {
            const pool = JSON.parse(localStorage.getItem('monsterPool') || JSON.stringify(DEFAULT_MONSTERS));
            const list = document.getElementById('monster-list');
            list.innerHTML = '';
            
            pool.forEach((m, i) => {
                const card = document.createElement('div');
                card.className = 'monster-card';
                card.innerHTML = `
                    <div style="font-weight: bold; margin-bottom: 15px; color: var(--accent-red);">#${i+1} ${m.name}</div>
                    <div class="grid-2">
                        <div class="input-group">
                            <label>HP</label>
                            <input type="number" class="m-hp" data-index="${i}" value="${m.hp}">
                        </div>
                        <div class="input-group">
                            <label>DAMAGE (ATK)</label>
                            <input type="number" class="m-dmg" data-index="${i}" value="${m.dmg}">
                        </div>
                    </div>
                `;
                list.appendChild(card);
            });
        }

        function savePlayerSettings() {
            const stats = {
                hp: parseInt(document.getElementById('player-hp').value),
                atk: parseInt(document.getElementById('player-atk').value),
                def: parseInt(document.getElementById('player-def').value),
                potions: parseInt(document.getElementById('player-potions').value)
            };
            localStorage.setItem('playerSettings', JSON.stringify(stats));
            alert("COMMANDER_STATS SYNCED.");
        }

        function saveMonsterPool() {
            const hps = document.querySelectorAll('.m-hp');
            const dmgs = document.querySelectorAll('.m-dmg');
            const pool = JSON.parse(localStorage.getItem('monsterPool') || JSON.stringify(DEFAULT_MONSTERS));
            
            hps.forEach((input, i) => {
                pool[i].hp = parseInt(input.value);
                pool[i].dmg = parseInt(dmgs[i].value);
            });
            
            localStorage.setItem('monsterPool', JSON.stringify(pool));
            alert("MONSTER_DATABASE UPDATED.");
        }

        function saveLootSettings() {
            const stats = {
                chance: parseFloat(document.getElementById('drop-chance').value),
                fixed: document.getElementById('fixed-drop').checked
            };
            localStorage.setItem('lootSettings', JSON.stringify(stats));
            alert("LOOT_PROTOCOL SYNCED.");
        }

        initAdmin();
    </script>
</body>
</html>
