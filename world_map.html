<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monster World - LBS Mapping Service</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Noto+Serif+KR:wght@400;700&display=swap');

        :root {
            --primary-red: #8b0000;
            --gold-accent: #b8860b;
            --bg-dark: #0a0a0a;
        }

        body, html {
            height: 100%;
            margin: 0;
            padding: 0;
            font-family: 'Noto Serif KR', serif;
            background: #000;
            overflow: hidden;
        }

        #map {
            height: 100%;
            width: 100%;
        }

        /* --- UI Overlay --- */
        #ui-layer {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            pointer-events: none;
        }

        .status-panel {
            background: rgba(10, 10, 10, 0.85);
            border: 2px solid var(--gold-accent);
            padding: 15px;
            color: #fff;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
            pointer-events: auto;
        }

        .status-panel h1 {
            font-family: 'Cinzel', serif;
            font-size: 1.2rem;
            margin: 0 0 5px 0;
            color: var(--gold-accent);
        }

        /* --- Battle Overlay --- */
        #battle-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 1000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        #battle-frame {
            width: 100%;
            height: 100%;
            border: none;
        }

        .close-battle {
            position: absolute;
            top: 20px;
            right: 20px;
            background: var(--primary-red);
            color: white;
            border: 2px solid #fff;
            padding: 10px 20px;
            cursor: pointer;
            font-family: 'Cinzel', serif;
            z-index: 1001;
        }

        /* --- Custom Marker Styles --- */
        .player-marker {
            width: 40px;
            height: 40px;
            background: var(--gold-accent);
            border: 3px solid #fff;
            border-radius: 50%;
            box-shadow: 0 0 15px var(--gold-accent);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.9); box-shadow: 0 0 0 0 rgba(184, 134, 11, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 15px rgba(184, 134, 11, 0); }
            100% { transform: scale(0.9); box-shadow: 0 0 0 0 rgba(184, 134, 11, 0); }
        }

    </style>
</head>
<body>

    <div id="ui-layer">
        <div class="status-panel">
            <h1>HUNTER COMPASS</h1>
            <div id="loc-status">GPS 탐색 중...</div>
            <div id="region-status" style="margin-top: 5px; font-size: 0.8rem; color: #aaa;"></div>
        </div>
    </div>

    <!-- The World Map -->
    <div id="map"></div>

    <!-- Hidden Battle Engine (The previous game) -->
    <div id="battle-overlay">
        <button class="close-battle" onclick="hideBattle()">EXIT WORLD</button>
        <iframe id="battle-frame" src="index.html"></iframe>
    </div>

    <!-- Google Maps API -->
    <!-- REPLACE 'YOUR_API_KEY' WITH YOUR ACTUAL KEY BELOW -->
    <script src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&callback=initMap" async defer></script>

    <script>
        let map, playerMarker;
        let monsters = [];
        let playerPos = { lat: 37.5665, lng: 126.9780 }; // Default Seoul
        let isJeju = false;

        const DARK_STYLE = [
            { "elementType": "geometry", "stylers": [{ "color": "#212121" }] },
            { "elementType": "labels.icon", "stylers": [{ "visibility": "off" }] },
            { "elementType": "labels.text.fill", "stylers": [{ "color": "#757575" }] },
            { "elementType": "labels.text.stroke", "stylers": [{ "color": "#212121" }] },
            { "featureType": "administrative", "elementType": "geometry", "stylers": [{ "color": "#757575" }] },
            { "featureType": "poi", "elementType": "geometry", "stylers": [{ "color": "#181818" }] },
            { "featureType": "road", "elementType": "geometry.fill", "stylers": [{ "color": "#2c2c2c" }] },
            { "featureType": "water", "elementType": "geometry", "stylers": [{ "color": "#000000" }] }
        ];

        function initMap() {
            map = new google.maps.Map(document.getElementById("map"), {
                center: playerPos,
                zoom: 17,
                styles: DARK_STYLE,
                disableDefaultUI: true,
                gestureHandling: "greedy"
            });

            playerMarker = new google.maps.Marker({
                position: playerPos,
                map: map,
                title: "You",
                icon: {
                    path: google.maps.SymbolPath.CIRCLE,
                    scale: 12,
                    fillColor: "#b8860b",
                    fillOpacity: 1,
                    strokeColor: "#ffffff",
                    strokeWeight: 3,
                }
            });

            startTracking();
        }

        function startTracking() {
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition(
                    (position) => {
                        const lat = position.coords.latitude;
                        const lng = position.coords.longitude;
                        playerPos = { lat, lng };

                        document.getElementById('loc-status').innerText = `Lat: ${lat.toFixed(4)}, Lng: ${lng.toFixed(4)}`;
                        
                        updateRegion(lat, lng);
                        playerMarker.setPosition(playerPos);
                        map.setCenter(playerPos);

                        if (monsters.length === 0) {
                            spawnMonsters();
                        }
                    },
                    (error) => {
                        console.error("GPS Error: ", error);
                        document.getElementById('loc-status').innerText = "Geolocation 권한 필요";
                    },
                    { enableHighAccuracy: true }
                );
            }
        }

        function updateRegion(lat, lng) {
            // Jeju Bounds Approximate
            if (lat > 33.1 && lat < 33.6 && lng > 126.1 && lng < 127.0) {
                isJeju = true;
                document.getElementById('region-status').innerText = "🚩 감지된 지역: 제주도 (Special Monster Buff)";
            } else {
                isJeju = false;
                document.getElementById('region-status').innerText = "🚩 감지된 지역: 일반 대륙";
            }
        }

        function spawnMonsters() {
            // Clear old monsters
            monsters.forEach(m => m.setMap(null));
            monsters = [];

            const monsterTypes = ["Overseer 01", "Gazer", "Watcher"];

            for (let i = 0; i < 3; i++) {
                // ~200m offset logic (randomly within 0.0015 range)
                const offsetLat = (Math.random() - 0.5) * 0.003;
                const offsetLng = (Math.random() - 0.5) * 0.003;

                const mPos = {
                    lat: playerPos.lat + offsetLat,
                    lng: playerPos.lng + offsetLng
                };

                const prefix = isJeju ? "[제주 특산] " : "";
                const name = prefix + monsterTypes[i];

                const marker = new google.maps.Marker({
                    position: mPos,
                    map: map,
                    title: name,
                    animation: google.maps.Animation.DROP,
                    icon: {
                        url: "https://maps.google.com/mapfiles/ms/icons/red-pushpin.png",
                        scaledSize: new google.maps.Size(40, 40)
                    }
                });

                marker.addListener("click", () => {
                    if (confirm(`${name}와 전투를 시작하시겠습니까?`)) {
                        showBattle();
                    }
                });

                monsters.push(marker);
            }
        }

        function showBattle() {
            document.getElementById('battle-overlay').style.display = 'flex';
        }

        function hideBattle() {
            document.getElementById('battle-overlay').style.display = 'none';
        }

    </script>
</body>
</html>
