<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jeju Odyssey - World Map</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Noto+Serif+KR:wght@400;700&display=swap');
        
        body, html { height: 100%; margin: 0; background: #000; overflow: hidden; font-family: 'Noto Serif KR', serif; color: white; }
        #viewport { width: 100vw; height: 100vh; position: relative; overflow: hidden; background: radial-gradient(circle, #222, #000); cursor: crosshair; }
        #map-container { position: absolute; width: 4000px; height: 4000px; background: url('https://www.visitjeju.net/images/jeju_map_all.png') no-repeat center; background-size: contain; transition: transform 0.1s ease-out; transform-origin: 0 0; }
        
        .marker {
            position: absolute; width: 40px; height: 40px; border-radius: 50%; border: 3px solid lime; background: rgba(0,255,0,0.2);
            transform: translate(-50%, -50%); display: flex; align-items: center; justify-content: center; color: white;
            font-weight: bold; font-size: 0.6rem; text-align: center; white-space: nowrap; pointer-events: auto;
            text-shadow: 0 0 5px black;
        }
        .marker span { position: absolute; bottom: -20px; font-weight: bold; font-size: 1rem; box-shadow: 0 0 15px gold; cursor: pointer; }
        
        .del-active .marker { border-color: red; box-shadow: 0 0 20px red; }
        .del-active .marker::after { content: '❌'; position: absolute; top: -10px; right: -10px; font-size: 1.5rem; }

        #player { position: absolute; width: 60px; height: 60px; z-index: 1000; transform: translate(-50%, -50%); pointer-events: none; }
        #player::after { content: '🚩'; font-size: 3.5rem; filter: drop-shadow(0 0 10px gold); }

        #ui-wrap { position: fixed; inset: 0; pointer-events: none; z-index: 9000; }
        .hud-top { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.8); padding: 15px; border: 1px solid gold; color: white; pointer-events: auto; }
        .btn-panel { position: absolute; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 8px; pointer-events: auto; }
        
        .btn { background: #222; border: 2px solid gold; color: gold; padding: 15px 30px; cursor: pointer; font-family: 'Cinzel'; font-size: 1rem; min-width: 200px; }
        .btn.active { background: #8b0000; color: white; border-color: white; }

        #form-box { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #111; border: 3px solid gold; padding: 25px; z-index: 10000; display: none; color: white; width: 340px; pointer-events: auto; }
        #form-box input { width: 100%; background: #222; color: #fff; border: 1px solid #444; padding: 12px; margin-top: 5px; box-sizing: border-box; }

        #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 8500; display: none; flex-direction: column; align-items: center; justify-content: center; pointer-events: auto; }
        #overlay img { width: 90%; height: 75%; object-fit: contain; border: 2px solid gold; }

        #toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 10px 20px; border-radius: 20px; display: none; }

        #story-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 15000; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; text-align: center; font-family: 'Cinzel'; padding: 20px; }
        #story-overlay h1 { font-size: 3rem; color: gold; text-shadow: 0 0 20px gold; margin-bottom: 20px; }
        #story-overlay p { font-size: 1.2rem; max-width: 600px; line-height: 1.6; color: #ccc; margin-bottom: 40px; }
        .btn-start { background: gold; color: black; border: none; padding: 15px 40px; font-weight: bold; cursor: pointer; font-size: 1.2rem; }
    </style>
</head>
<body id="master-body">
    <div id="toast">메시지</div>

    <!-- STORY INTRO -->
    <div id="story-overlay">
        <h1>JEJU ODYSSEY</h1>
        <p>전설에 따르면 제주도 전역에 이계의 포탈이 열리기 시작했습니다. <br>당신은 제주도의 수호자가 되어 각 지역의 임무를 완수하고 몬스터를 물리쳐야 합니다.</p>
        <button class="btn-start" onclick="startOdyssey()">탐험 시작하기</button>
    </div>

    <div id="overlay">
        <h2 id="oz-name" style="color:gold; font-family:'Cinzel';">영역 진입</h2>
        <img id="oz-img" src="" alt="Dungeon">
        <div style="display:flex; gap:10px; margin-top:20px; width:90%;">
            <button class="btn" style="flex:1; background:gold; color:black; font-weight:bold;" onclick="enterBattle()">⚔️ 미션 장소로 진입</button>
            <button class="btn" style="flex:1; background:#333; min-width:100px;" onclick="closeOver()">닫기</button>
        </div>
    </div>

    <!-- ADD FORM -->
    <div id="form-box">
        <h3 style="font-family:'Cinzel'; margin:0 0 15px 0; color:gold; border-bottom:1px solid #444; padding-bottom:10px;">🚩 구역 & 몬스터 편집기</h3>
        <div style="background: rgba(44,44,44,0.3); padding: 10px; border-radius: 5px; margin-bottom: 10px;">
            <label style="font-size: 0.8rem; color: #aaa;">[기본 정보]</label>
            <input type="text" id="fn" placeholder="구역 이름">
            <div style="display:flex; gap:5px;"><input type="text" id="flat" readonly><input type="text" id="flng" readonly></div>
            <input type="number" id="fr" placeholder="범위 (m)" value="50">
        </div>
        <div style="background: rgba(139, 0, 0, 0.15); padding: 10px; border-radius: 5px; margin-bottom: 10px; border: 1px solid #500;">
            <label style="font-size: 0.8rem; color: #ff3c3c;">[포탈 & 미션 설정]</label>
            <input type="text" id="fms" placeholder="미션 목표 (예: 상자 3개 찾기)">
            <label style="font-size:0.7rem; color:#888; display:flex; align-items:center; margin-top:5px;">
                <input type="checkbox" id="fpo" style="width:20px; margin:0 5px 0 0;"> 포탈 개방 여부
            </label>
        </div>
        <div style="display:flex; gap:10px; margin-top:20px;">
            <button class="btn" id="fs" style="flex:2; padding:10px;" onclick="saveM()">구역 저장</button>
            <button class="btn" style="flex:1; background:#333; padding:10px;" onclick="hideF()">취소</button>
        </div>
    </div>

    <div id="viewport">
        <div id="map-container" onmousedown="mClicked(event)">
            <div id="player"></div>
        </div>
    </div>

    <div id="ui-wrap">
        <div class="hud-top">
            <h1 style="font-family:'Cinzel'; font-size:1.1rem; margin:0;">JEJU ODYSSEY v8.0</h1>
            <div id="gps-st" style="color:yellow; font-size:0.8rem; margin-top:5px;">GPS 감지중...</div>
            <div id="gps-co" style="font-size:0.7rem; color:#888;">-- / --</div>
        </div>
        <div class="btn-panel" id="admin-tools" style="display: none;">
            <button id="btn-sm" class="btn" onclick="tSim()">🕹️ 시뮬레이션: OFF</button>
            <button id="btn-ad" class="btn" onclick="tAdm()">🛡️ 배치 모드: OFF</button>
            <button id="btn-de" class="btn" onclick="tDel()">🗑️ 삭제 모드: OFF</button>
            <button class="btn" style="background:#555;" onclick="triggerRandPortal()">⚡ 강제 포탈 이벤트</button>
            <button class="btn" style="background:#444; font-size:0.8rem;" onclick="resetD()">⚠️ 전체 초기화</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const isAdminSession = window.location.href.includes('admin.html');
        if (isAdminSession) { document.getElementById('admin-tools').style.display = 'flex'; }

        const SB_URL = "https://sdqxdrwjwdcaamezvmyf.supabase.co";
        const SB_KEY = "sb_publishable_ghjdZA43FNQjZDDMgODH6w_VJsSnMA9";
        const sb = supabase.createClient(SB_URL, SB_KEY);

        let map = document.getElementById('map-container');
        let player = document.getElementById('player');
        let tx=0, ty=0, px=2000, py=2000, scale=1;
        let pLat=33.3617, pLng=126.5292;
        let markers=[], isSim=false, isAdm=false, isDel=false, lZone=null;

        function startOdyssey() { document.getElementById('story-overlay').style.display = 'none'; }

        async function loadM() {
            const { data, error } = await sb.from('regions').select('*');
            if (data) { markers = data; markers.forEach(plotM); }
            checkP();
        }
        loadM();

        function checkP() {
            const R=6371e3;
            let near = null;
            markers.forEach(m => {
                const φ1 = pLat * Math.PI/180;
                const φ2 = m.lat * Math.PI/180;
                const Δφ = (m.lat-pLat) * Math.PI/180;
                const Δλ = (m.lng-pLng) * Math.PI/180;
                const a = Math.sin(Δφ/2)**2 + Math.cos(φ1)*Math.cos(φ2)*Math.sin(Δλ/2)**2;
                const d = R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
                if (d < (m.radius || 50)) near = m;
            });
            if (near && lZone !== near.id) {
                lZone = near.id;
                openZone(near);
            } else if (!near) lZone = null;
        }

        function openZone(m) {
            document.getElementById('oz-name').innerText = m.name + (m.is_portal_open ? " [PORTAL]" : "");
            document.getElementById('oz-img').src = m.image_url || "https://www.visitjeju.net/images/jeju_map_all.png";
            document.getElementById('overlay').style.display = 'flex';
        }

        function closeOver() { document.getElementById('overlay').style.display = 'none'; }

        function enterBattle() {
            const m = markers.find(mark => mark.id === lZone);
            if (!m) return;
            const isPortal = m.is_portal_open ? "true" : "false";
            const adminFlag = isAdminSession ? "&admin=true" : "";
            location.href = `battle.html?region=${encodeURIComponent(m.name)}&portal=${isPortal}&mission=${encodeURIComponent(m.mission || "")}${adminFlag}`;
        }

        updateP();
        function updateP() {
            px = 2000 + (pLng - 126.5292) * 50000;
            py = 2000 - (pLat - 33.3617) * 50000;
            player.style.left = px + 'px';
            player.style.top = py + 'px';
            if (!isSim) { tx = -px * scale + window.innerWidth/2; ty = -py * scale + window.innerHeight/2; }
            map.style.transform = `translate(${tx}px, ${ty}px) scale(${scale})`;
            document.getElementById('gps-co').innerText = `${pLat.toFixed(5)} / ${pLng.toFixed(5)}`;
        }

        function mClicked(e) {
            if (!isAdm) return;
            const rect = map.getBoundingClientRect();
            const x = (e.clientX - rect.left) / scale;
            const y = (e.clientY - rect.top) / scale;
            document.getElementById('flat').value = (33.3617 - (y - 2000) / 50000).toFixed(6);
            document.getElementById('flng').value = (126.5292 + (x - 2000) / 50000).toFixed(6);
            document.getElementById('form-box').style.display = 'block';
        }

        async function saveM() {
            const n = document.getElementById('fn').value;
            const lat = parseFloat(document.getElementById('flat').value);
            const lng = parseFloat(document.getElementById('flng').value);
            const r = parseInt(document.getElementById('fr').value);
            const ms = document.getElementById('fms').value;
            const po = document.getElementById('fpo').checked;
            if (!n) return;
            const { data, error } = await sb.from('regions').insert([{ name:n, lat, lng, radius:r, mission:ms, is_portal_open:po }]).select();
            if (!error && data) { plotM(data[0]); markers.push(data[0]); hideF(); showT("✅ 구역 등록 완료"); }
        }

        function tSim() { isSim = !isSim; document.getElementById('btn-sm').innerText = isSim ? "🕹️ 시뮬레이션: ON" : "🕹️ 시뮬레이션: OFF"; }
        function tAdm() { isAdm = !isAdm; isDel = false; updateUI(); document.getElementById('btn-ad').innerText = isAdm ? "🛡️ 배치 모드: ON" : "🛡️ 배치 모드: OFF"; }
        function tDel() { isDel = !isDel; isAdm = false; updateUI(); document.getElementById('btn-de').innerText = isDel ? "🗑️ 삭제 모드: ON" : "🗑️ 삭제 모드: OFF"; }
        function updateUI() {
            document.getElementById('master-body').className = isDel ? 'del-active' : '';
            document.getElementById('btn-ad').classList.toggle('active', isAdm);
            document.getElementById('btn-de').classList.toggle('active', isDel);
        }

        function plotM(m) {
            const d = document.createElement('div');
            d.className = 'marker'; d.id = m.id;
            const pActive = m.is_portal_open ? "box-shadow: 0 0 25px cyan; border-color: cyan;" : "";
            d.style.cssText += pActive;
            d.style.left = (2000 + (m.lng - 126.5292) * 50000) + 'px';
            d.style.top = (2000 - (m.lat - 33.3617) * 50000) + 'px';
            d.innerHTML = `<span>${m.name}</span><br><span style="font-size:0.6rem; color:${m.is_portal_open ? 'cyan':'lime'};">${m.is_portal_open ? '🌀 PORTAL' : 'MONSTER'}</span>`;
            d.onmousedown = (e) => { e.stopPropagation(); if (isDel) killM(m.id); else if (!isAdm) openZone(m); };
            map.appendChild(d);
        }

        async function killM(id) {
            const { error } = await sb.from('regions').delete().eq('id', id);
            if (!error) { document.getElementById(id).remove(); markers=markers.filter(m=>m.id!==id); showT("🗑️ 삭제 완료"); }
        }

        function hideF() { document.getElementById('form-box').style.display='none'; }
        function showT(m) { const t=document.getElementById('toast'); t.innerText=m; t.style.display='block'; setTimeout(()=>t.style.display='none',2000); }
        async function resetD() { if(confirm("초기화?")) { await sb.from('regions').delete().neq('id','0'); location.reload(); } }

        async function triggerRandPortal() {
            if (markers.length === 0) return;
            const rIdx = Math.floor(Math.random() * markers.length);
            const m = markers[rIdx];
            const { error } = await sb.from('regions').update({ is_portal_open: true, mission: "긴급! 지역의 차원문을 닫고 수호자를 처치하라!" }).eq('id', m.id);
            if (!error) { showT(`⚡ ${m.name}에 포탈 발생!`); location.reload(); }
        }

        window.onkeydown = (e) => {
            if (!isSim) return;
            const S=0.0005;
            if (e.key==='ArrowUp') pLat+=S; if (e.key==='ArrowDown') pLat-=S;
            if (e.key==='ArrowLeft') pLng-=S; if (e.key==='ArrowRight') pLng+=S;
            updateP(); checkP();
        };
    </script>
</body>
</html>
